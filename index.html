<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A minimalist personal journal with AI-powered mood insights.">
  <title>Journal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Mobile hamburger -->
  <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">☰</button>

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>Journal</h1>
      <div class="sidebar-controls">
        <button id="btn-new" title="New entry">✦ New</button>
        <button id="btn-sort" title="Toggle sort order">↓ Newest</button>
      </div>
    </div>

    <div class="entry-list" id="entry-list">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 20h9"/>
          <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
        <p>No entries yet.<br>Start writing your first page.</p>
      </div>
    </div>

    <div class="sidebar-footer">
      <button id="btn-load-file">📂 Load journal.json</button>
      <button id="btn-save-file">💾 Save journal.json</button>
      <button class="ai-btn" id="btn-ai">✨ AI Insights</button>
    </div>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main">
    <!-- Toolbar -->
    <div class="toolbar">
      <button data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
      <button data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
      <button data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
      <button data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
      <div class="separator"></div>
      <button id="btn-link" title="Insert link">🔗</button>
      <div class="separator"></div>
      <button data-cmd="insertUnorderedList" title="Bullet list">•≡</button>
      <button data-cmd="insertOrderedList" title="Numbered list">1.</button>

      <div class="toolbar-right">
        <button class="btn-delete" id="btn-toolbar-delete" title="Delete entry">Delete</button>
        <button class="btn-save" id="btn-toolbar-save" title="Save entry">Save</button>
      </div>
    </div>

    <!-- Editor -->
    <div class="editor-container">
      <div class="paper">
        <input class="title-input" id="title-input" type="text" placeholder="Untitled Entry" maxlength="120">
        <div class="editor" id="editor" contenteditable="true"></div>
      </div>
    </div>
  </main>

  <!-- ===== Link Modal ===== -->
  <div class="modal-overlay" id="link-modal">
    <div class="modal">
      <h2>Insert Link</h2>
      <label for="link-url">URL</label>
      <input type="url" id="link-url" placeholder="https://example.com">
      <label for="link-text">Display text (optional)</label>
      <input type="text" id="link-text" placeholder="Link text">
      <div class="modal-actions">
        <button id="link-cancel">Cancel</button>
        <button class="btn-primary" id="link-insert">Insert</button>
      </div>
    </div>
  </div>

  <!-- ===== AI Modal ===== -->
  <div class="modal-overlay ai-modal" id="ai-modal">
    <div class="modal">
      <h2>✨ AI Journal Insights</h2>
      <label for="ai-key">OpenAI-compatible API Key</label>
      <input type="password" id="ai-key" placeholder="sk-…">
      <label for="ai-endpoint">API Endpoint (optional)</label>
      <input type="url" id="ai-endpoint" placeholder="https://api.openai.com/v1/chat/completions">
      <label for="ai-model">Model</label>
      <input type="text" id="ai-model" placeholder="gpt-4o-mini">
      <div class="modal-actions">
        <button id="ai-cancel">Cancel</button>
        <button class="btn-primary" id="ai-analyze">Analyze My Journal</button>
      </div>
      <div class="ai-results" id="ai-results" style="display:none;"></div>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept=".json" style="display:none;">

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
